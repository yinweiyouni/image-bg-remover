<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>图片背景消除工具</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@400;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header class="header">
            <h1 class="title">图片背景消除</h1>
            <p class="subtitle">AI-powered Background Remover</p>
        </header>

        <main class="main-content">
            <div class="upload-section" id="uploadSection">
                <div class="upload-area" id="uploadArea">
                    <div class="upload-icon">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                            <polyline points="17 8 12 3 7 8"></polyline>
                            <line x1="12" y1="3" x2="12" y2="15"></line>
                        </svg>
                    </div>
                    <p class="upload-text">拖拽图片到这里或点击上传</p>
                    <p class="upload-hint">支持 JPG, PNG 格式</p>
                    <input type="file" id="fileInput" accept="image/jpeg,image/png" hidden>
                </div>
            </div>

            <div class="preview-section" id="previewSection" style="display: none;">
                <div class="preview-container">
                    <div class="preview-box">
                        <h3 class="preview-title">原图</h3>
                        <div class="preview-image-wrapper">
                            <img id="originalImage" alt="原图">
                        </div>
                    </div>
                    <div class="preview-box">
                        <h3 class="preview-title">处理后</h3>
                        <div class="preview-image-wrapper result-wrapper" id="resultWrapper">
                            <img id="resultImage" alt="处理结果" style="display: none;">
                            <div class="checkerboard" id="checkerboard"></div>
                            <div class="loading-spinner" id="loadingSpinner" style="display: none;">
                                <div class="spinner"></div>
                                <p>处理中...</p>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="action-buttons">
                    <button class="btn btn-primary" id="removeBgBtn">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"></polygon>
                        </svg>
                        消除背景
                    </button>
                    <button class="btn btn-secondary" id="downloadBtn" disabled>
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                            <polyline points="7 10 12 15 17 10"></polyline>
                            <line x1="12" y1="15" x2="12" y2="3"></line>
                        </svg>
                        下载图片
                    </button>
                    <button class="btn btn-outline" id="resetBtn">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <polyline points="1 4 1 10 7 10"></polyline>
                            <path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"></path>
                        </svg>
                        重置
                    </button>
                </div>
            </div>

            <div class="settings-section" id="settingsSection">
                <h3 class="settings-title">API 设置</h3>
                <div class="input-group">
                    <label for="apiKeyInput">Remove.bg API Key</label>
                    <input type="password" id="apiKeyInput" placeholder="输入你的 API Key">
                </div>
                <button class="btn btn-small" id="saveApiKeyBtn">保存</button>
                <p class="settings-hint">API Key 只会保存在浏览器本地，不会上传</p>
            </div>
        </main>

        <footer class="footer">
            <p>Powered by <a href="https://www.remove.bg" target="_blank">remove.bg</a></p>
        </footer>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
